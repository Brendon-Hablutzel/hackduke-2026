services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: emailsearch
      POSTGRES_USER: emailsearch
      POSTGRES_PASSWORD: emailsearch
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emailsearch"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:0.5.18
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8001:8000"
    environment:
      - ANONYMIZED_TELEMETRY=false
      - ALLOW_RESET=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./credentials:/app/credentials
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - APP_BASE_URL=http://localhost:3000
      - CORS_ORIGINS=http://localhost:3000
      - DATABASE_URL=postgresql://emailsearch:emailsearch@postgres:5432/emailsearch
    depends_on:
      chromadb:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./app/frontend
    ports:
      - "3000:80"
    depends_on:
      - app

volumes:
  chroma_data:
  postgres_data:
